<!-- BEGIN: custom -->
 <link href="{corefolder}/external/fullcalendar/fullcalendar.min.css" rel="stylesheet">
<script src='{corefolder}/external/fullcalendar/lib/moment.min.js'></script>
<script src='{corefolder}/external/fullcalendar/fullcalendar.min.js'></script>
<script src='{corefolder}/external/fullcalendar/locale/fr.js'></script>
<style>
	#calendar {
		width: 100%;
		padding: 0px;
	}

	.fc-time-grid .fc-slats td {
		height: 1em;
		font-size: 10px;
	}

	.fc-time {	color: #000000; }
	.fc-title {	color: black; }
	.fc-end-resizer { color: #777777; }

	.fc-toolbar { display: none; }
	.fc-day-grid { display: none; }
	.fc-axis { width: 60px; }</style>


<!-- Mes informations -->
<div class="sidebar-section">
	<div class="sidebar-section-title">
	<i class="mdi mdi-account-circle"></i> {lang_mydata}
	</div>
	<div class="info-row">
		<span class="info-label">{lang_balance}</span>
		<span class="info-value"><a href="{path_root}/index.php?mod=comptes&id=1">{solde}</a></span>
	</div>
	<div class="info-row">
		<span class="info-label">{lang_nbflights} ({nb_mois} {lang_month})</span>
		<span class="info-value warn"><a href="{path_root}/index.php?mod=aviation&rub=vols&id=1" style="color:#c0392b;">{nb_vols} vols</a></span>
	</div>
</div>

<!-- BEGIN: aff_echeance_avion -->
<!-- Échéances avions -->
<div class="sidebar-section">
	<div class="sidebar-section-title">
	<i class="mdi mdi-airplane"></i> {lang_planedeadline}
	</div>
	{form_echeance_avion}
</div>
<!-- END: aff_echeance_avion -->


<!-- BEGIN: manifestation -->
<!-- Prochaines manifestations -->
<div class="sidebar-section">
	<div class="sidebar-section-title">
		<i class="mdi mdi-calendar-text"></i> {lang_nextmeeting}
	</div>
	<!-- BEGIN: lst_manifestation -->
	<div class="manif-item">
		<div class="manif-date-badge">
			<span class="day">{manif_day}</span>
			<span>{manif_month}</span>
		</div>
		<div>
			<a href="{path_root}/manifestations/detail?id={manif_id}" style="font-size:0.83rem; font-weight:500; color:#2d3748;">{manif_title}</a>
			<div style="font-size:0.75rem; color:#718096;">{manif_date}</div>
		</div>
	</div>
	<!-- END: lst_manifestation -->	
 </div>
<!-- END: manifestation -->


	
<!-- BEGIN: aff_reservation -->
<!-- Réservations du jour -->
<div class="sidebar-section">
	<div class="sidebar-section-title">
	<i class="mdi mdi-calendar-today"></i> {lang_schedule}
	</div>
	<div id="script-warning" style="display:none; background:#fff5f5; border-left:3px solid #c0392b; padding:8px 10px; font-size:0.78rem; color:#c0392b; border-radius:0;">
	<i class="mdi mdi-alert-circle"></i> API inaccessible
	</div>
	<div id="loading" style="display:none; font-size:0.82rem; color:#718096; text-align:center; padding:10px;">
	<i class="mdi mdi-loading mdi-spin"></i> Chargement…
	</div>
	<div id="calendar"></div>
</div>

<script type="text/javascript">
	$(document).ready(function() {
	
		$('#calendar').fullCalendar({
			defaultDate: '{form_jour}',
			defaultView: '{defaultView}',
			defaultEventMinutes: 60,
			slotDuration: '01:00:00',
			timeFormat: 'H:mm',
			lang: 'fr',
			editable: true,
			selectable: true,
			selectHelper: true,
			minTime: '{form_debjour}:00:00',
			maxTime: '{form_finjour}:00:00',
			scrollTime: '{form_debjour}:00:00',
			axisFormat: 'HH:mm',
			height: 400,
			slotEventOverlap: false,

			header: {
				left: '',
				center: '',
				right: ''
			},

			businessHours:
	       {
			   start: '0:00', // a start time (10am in this example)
			   end: '23:59', // an end time (12pm in this example)
			   dow: [ 1,2,3,4,5 ]
			},

		   views: {
				agendaFourWeeks: {
					type: 'agenda',
					duration: {weeks: 4},
					buttonText: 'Default',
					columnFormat: 'DD'
				}
			},

			select: function(start, end) {
				document.location="/index.php?mod=reservations&rub=reservation&ress={form_ress}"+"&jstart="+start+"&jend="+end;
			},

			eventClick: function(event, element) {
				document.location="/index.php?mod=reservations&rub=reservation&id="+event.id;
		    },

			eventResize: function(event, dayDelta, minuteDelta ) {
				$.ajax({ url: '/api.php?mod=reservations&rub=updatecal&id='+event.id+'&jstart='+event.start+'&jend='+event.end+'&dayDelta='+dayDelta });
			},
			eventDrop: function(event,dayDelta,minuteDelta) {
				$.ajax({ url: '/api.php?mod=reservations&rub=updatecal&id='+event.id+'&jstart='+event.start+'&jend='+event.end+'&dayDelta='+dayDelta });
			},
			eventRender: function( event, element, view ) {
				var title = element.find( '.fc-title' );
				title.html( title.text() );
			},
			events: {
				url: 'api.php?mod=reservations&rub=getcal&ress=0',
				error: function() {
					$('#script-warning').show();
				}
			},

			loading: function(bool) {
				$('#loading').toggle(bool);
			}
		});
		
	});
	
</script>

<!-- END: aff_reservation -->

<!-- END: custom -->
