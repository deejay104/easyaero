</div>

<!-- BEGIN: aff_echeance_avion -->

	<div class="sidebar-section-title">
	<i class="mdi mdi-airplane"></i> {lang_planedeadline}
	</div>
	{form_echeance_avion}
</div>

<!-- BEGIN: manifestation -->
<!-- Prochaines manifestations -->
<div class="sidebar-section">
	<div class="sidebar-section-title">
		<i class="mdi mdi-calendar-text"></i> {lang_nextmeeting}
	</div>
	<!-- BEGIN: lst_manifestation -->
	<div class="manif-item">
		<div class="manif-date-badge">
			<span class="day">{manif_day}</span>
			<span>{manif_month}</span>
		</div>
		<div>
			<a href="{path_root}/manifestations/detail?id={manif_id}" style="font-size:0.83rem; font-weight:500; color:#2d3748;">{manif_title}</a>
			<div style="font-size:0.75rem; color:#718096;">{manif_date}</div>
		</div>
	</div>
	<!-- END: lst_manifestation -->	
 </div>
<!-- END: manifestation -->


	
<!-- BEGIN: aff_reservation -->
<!-- Réservations du jour -->
<div class="sidebar-section">
	<div class="sidebar-section-title">
	<i class="mdi mdi-calendar-today"></i> {lang_schedule}
	</div>
	<div id="script-warning" class="d-none" style="background:#fff5f5; border-left:3px solid #c0392b; padding:8px 10px; font-size:0.78rem; color:#c0392b; border-radius:0;">
	<i class="mdi mdi-alert-circle"></i> API inaccessible
	</div>
	<div id="loading" class="d-none" style="font-size:0.82rem; color:#718096; text-align:center; padding:10px;">
	<i class="mdi mdi-loading mdi-spin"></i> Chargement…
	</div>
	<div id="calendar"></div>
</div>

<script type="text/javascript">

		$.ajax({
			type: 'GET',
			url: '/api/v1/reservations/getcal?ress=0&start={dte_start}&end={dte_end}',
			dataType: 'JSON',

			success: function(response) {
				$("#loading").addClass("d-none");

				var nb=0;
				$.each(response, function (index, value) {
					if (value.type=="calendar")
					{
						start=new Date(value.start);
						const start_hour = start.toLocaleString('fr-FR', { hour: 'numeric', minute: '2-digit' });
						const start_date = start.toLocaleString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });

						end=new Date(value.end);
						const end_date = end.toLocaleString('fr-FR', { hour: '2-digit', minute: '2-digit' });

						txt ='<div class="manif-item">';
						txt+='<div class="manif-date-badge">';
						txt+='<span class="hour">'+start_hour+'</span>';
						txt+='<span></span>';
						txt+='</div>';
						txt+='<div>';
						txt+='<a href="{path_root}/reservations/reservation?id='+value.eventId+'" style="font-size:0.83rem; font-weight:500; color:#2d3748;">'+value.title+'</a>';
						txt+='<div style="font-size:0.75rem; color:#718096;">'+start_date+' - '+end_date+'</div>';
						txt+='</div>';
						txt+='</div>';

						$("#calendar").append(txt);
						nb++;
					}
				});

				
				if (nb==0)
				{
					txt ='<div class="manif-item">';
					txt+='<div class="manif-date-badge">';
					txt+='<span class=""><i class="mdi mdi-large mdi-airplane"></i></span>';
					txt+='</div>';
					txt+='<div>';
					txt+="<p style='font-size:0.83rem; font-weight:500; color:#2d3748;'>Aucune réservation pour aujourd'hui</p>";
					txt+='</div>';
					txt+='</div>';
					$("#calendar").append(txt);
				}

			}

		});
	
</script>

<!-- END: aff_reservation -->

<!-- END: custom -->
