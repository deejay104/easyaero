	<img src="{path_module}/img/icn48_titre.png" alt="" border=0 />
<!-- END: icone -->

<!-- BEGIN: infos -->


<!-- END: infos -->

<!-- BEGIN: corps -->

<style>
	#loading {
		display: none;
		position: absolute;
		top: 10px;
		right: 10px;
	}

	.afficheLegende { line-height:16px; margin: 5px; }
	.afficheLegende label { width:20px; height:20px; border: 1px solid #013366; border-radius: 4px; float:left; display: block-inline; margin: 0px 5px; }

	.fc-blocked {
		background-image: repeating-linear-gradient(
			45deg,
			rgba(0,0,0,0.25),
			rgba(0,0,0,0.25) 3px,
			transparent 3px,
			transparent 10px
		) !important;
		opacity: 0.5;
	}

	.fc-tooltip {
		position: absolute;
		background: var(--p67-form-bg);
		color: var(--p67-text);
		padding: 5px 10px;
		border: 1px solid var(--p67-border);
		border-radius: 4px;
		font-size: 12px;
		pointer-events: none;
		z-index: 9999;
		max-width: 300px;
		word-wrap: break-word;   /* coupe les mots trop longs */
		overflow-wrap: break-word; /* équivalent moderne */
		white-space: normal;     /* autorise le retour à la ligne */
	}

</style>

<div class="row">
	<div class="col grid-margin stretch-card">
		<div class="card">
			<div class="card-header">
				<span>{TexteTitre}</span>
				&nbsp;
				<select id="ress" name="ress" class="form-control" OnChange="Recharge();">
					<option value="0">Tous</OPTION>
					<!-- BEGIN: lst_ress -->
					<option value="{uid_ress}" {chk_ress}>{nom_ress}</option>
					<!-- END: lst_ress -->
				</select>
			</div>

			<div class="card-body">

				<div id='calendar' style='min-height: 620px;'></div>
				<p style="font-size: 10px; line-height:12px;">
				Couché et Levé du soleil calculés pour le terrain de {terrain_nom}, plus ou moins la 1/2 heure réglementaire.
				</p>
					
				<table>
				<tr>
					<td>
						<p class="afficheLegende">
							<label style="background-color: #{maintconf}; "></label>
							{lang_maintconfirmed}
						</p>

						<p class="afficheLegende">
							<label style="background-color: #{maintplan};"></label>
							{lang_maintscheduled}
						</p>
						<p class="afficheLegende">
							<label style="background-color: #{meeting};"></label>
							{lang_event}
						</p>
					</td>
					<td>

					<!-- BEGIN: lst_couleur -->
					<p class="afficheLegende" style="width:180px; padding-left:20px;">
						<label style="background-color: #{couleur_col}; "></label>
						<span>{couleur_nom}</span>
					</p>
					<!-- END: lst_couleur -->
					</td>
				</tr>
				</table>
			</div>
		</div>
	</div>
</div>



<script src='{path_root}/{path_core}/external/fullcalendar/fullcalendar.v6.js'></script>


<script>

	function Recharge()
	{
		var a = document.getElementById("ress").value;
		document.location="{path_root}/reservations/index?ress="+a+"&jour={form_jour}";
	}

	var oldView="old";
	
	document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        var calendar = new FullCalendar.Calendar(calendarEl, {
			initialDate: '{form_jour}',
			initialView: '{defaultView}',
			timeZone: '{timezone}', 
			locale: 'fr',
			defaultTimedEventDuration: 60,
			eventTimeFormat: { hour: '2-digit', minute: '2-digit', hour12: false },
			editable: true,
			selectable: true,
			selectMirror: true,
			slotMinTime: '{form_debjour}:00:00',
			slotMaxTime: '{form_finjour}:00:00',
			scrollTime: '{form_debjour}:00:00',
			contentHeight: 'auto',
			slotEventOverlap: false,
			allDaySlot: false,
			firstDay: {weekFirstDay},

			buttonText: {
				today:  "Aujourd'hui",
				month:  "Mois",
				week:   "Semaine",
				day:    "Jour",
				list:   "Liste"
			},

			headerToolbar: {
				left: 'prev,next,today',
				center: 'title',
				right: '{headerListe}'
			},

			businessHours:
			{
				daysOfWeek: [1, 2, 3, 4, 5], // Lun-Ven
				startTime: '00:00',
				endTime: '24:00'
			},
			views: {
				agendaDay: {
					type: 'timeGrid',
					duration: { days: 1 },
					buttonText: 'Jour',
					dateIncrement: { days: 1 },
					dayMaxEvents: 5,
				},
				agendaWeek: {
					type: 'timeGrid',
					duration: { weeks: 1 },
					buttonText: 'Semaine',
					dayHeaderFormat: { weekday: 'short', day: 'numeric', omitCommas: true },
					dateIncrement: { weeks: 1 },
					dayMaxEvents: 5
				},
				agendaTwoWeeks: {
					type: 'timeGrid',
					duration: { weeks: 2 },
					buttonText: '2 Semaines',
					dayHeaderFormat: { day: 'numeric', omitCommas: true },
					dateIncrement: { weeks: 1 },
					dayMaxEvents: 5
				},
				agendaFourWeeks: {
					type: 'timeGrid',
					duration: {weeks: 4},
					buttonText: '4 Semaines',
					dayHeaderFormat: { day: 'numeric',  omitCommas: true },
					dateIncrement: { weeks: 1 },
					dayMaxEvents: 3
				},
				agendaMonth: {
					type: 'dayGridMonth',
					buttonText: 'Mois',
					dayMaxEvents: 5,
					height: 700
				}
			},

			select: function(event) {
				dteStart=new Date(event.startStr);
				timeStart=Math.floor(dteStart.getTime() / 1000);
				dteEnd=new Date(event.endStr);
				timeEnd=Math.floor(dteEnd.getTime() / 1000);
				document.location="{path_root}/reservations/reservation?ress={form_ress}"+"&jstart="+timeStart+"&jend="+timeEnd;
			},

			eventClick: function(event) {
				document.location="{path_root}/reservations/reservation?id="+event.event.extendedProps.eventId;
			},

			eventResize: function(event) {
				e=event.event.extendedProps;
				dteStart=new Date(event.event.startStr);
				timeStart=Math.floor(dteStart.getTime() / 1000);
				dteEnd=new Date(event.event.endStr);
				timeEnd=Math.floor(dteEnd.getTime() / 1000);

				$.ajax({
					url: '{path_root}/api/v1/reservations/updatecal?id='+e.eventId+'&jstart='+timeStart+'&jend='+timeEnd,
					dataType: 'JSON',
					success : function(response)
					{
						if (response.status!=200)
						{
							showToast("Mise à jour",response.value,"error");
							revertFunc();
						}
					},
					error : function(response)
					{
						console.log(response);
						revertFunc();
					}
				});
			},
			eventDrop: function(event,dayDelta,revertFunc) {
				console.log("drop");
				e=event.event.extendedProps;
				dteStart=new Date(event.event.startStr);
				timeStart=Math.floor(dteStart.getTime() / 1000);
				dteEnd=new Date(event.event.endStr);
				timeEnd=Math.floor(dteEnd.getTime() / 1000);

				$.ajax({
					url: '{path_root}/api/v1/reservations/updatecal?id='+e.eventId+'&jstart='+timeStart+'&jend='+timeEnd,
					dataType: 'JSON',
					success : function(response)
					{
						if (response.status!=200)
						{
							showToast("Mise à jour",response.value,"error");
							revertFunc();
						}
					},
					error : function(response)
					{
						console.log(response);
						revertFunc();
					}
				});
			},

			events: {
				url: '{path_root}/api/v1/reservations/getcal?ress={form_ress}',
				error: function() {
					showToast("","L'API n'est pas accessible","error");
				}
			},

			eventRender: function( event, element, view ) {
				var title = element.find( '.fc-title' );
				title.html( title.text() );
			},


			<!-- BEGIN: aff_tooltips -->

			eventDidMount: function(info) {
				//var txt = '<div id="CalendarDesc" class="calendarDesc" style="position:absolute;z-index:10001;left:0px;top:0px;display:block">' + event.event.extendedProps.description + '</div>';

				const tooltip = document.createElement('div');
				tooltip.className = 'fc-tooltip';
				tooltip.innerHTML = info.event.extendedProps.description;
				info.el.addEventListener('mouseenter', () => {
					document.body.appendChild(tooltip);
					const rect = info.el.getBoundingClientRect();
					tooltip.style.left = rect.left + 'px';
					tooltip.style.top  = (rect.top - tooltip.offsetHeight - 5) + window.scrollY + 'px';
				});

				info.el.addEventListener('mouseleave', () => tooltip.remove());
			},

			<!-- END: aff_tooltips -->

			loading: function(bool) {
				$('#loading').toggle(bool);
			}
		});
		calendar.render();
	});

		
</script>
<!-- END: corps -->
