<!-- END: icone -->
<!-- BEGIN: infos -->
{aff_menu}

<!-- BEGIN: corps -->
<script type="text/javascript">
	function Recharge()
	{
		document.location='{path_root}/suivi/tableaubord?id='+document.getElementById('form_id').value+'&dte='+document.getElementById('form_date').value+'&show='+document.getElementById('form_mois').value;
	}

</script>

<style>
	.table-thinline td { line-height: 12px!important; }
	.bor-left { border-left: 1px solid var(--p67-primary); }
	.bor-large-top { border-top: 2px solid var(--p67-primary); }
	.txt-light { color: var(--p67-primary); }
</style>


<FORM name="compte" id="compte" method="post" action="{path_root}/index.php" enctype="multipart/form-data" OnSubmit="return false;">


<div class="row">
	<div class="col grid-margin stretch-card">
		<div class="card">
			<div class="card-header">	
				<div class="form-inline">
					Compte :
					<SELECT id="form_id" class='form-control' name="form_id" OnChange="Recharge();">
					<!-- BEGIN: lst_compte -->
						<OPTION value="{id_compte}" {chk_compte}>{nom_compte}</OPTION>
					<!-- END: lst_compte -->
					</SELECT>

					Année : 
					<SELECT id="form_date" class='form-control' style="min-width:100px!important;" name="form_date" OnChange="Recharge();">
					<!-- BEGIN: lst_annee -->
						<OPTION value="{dte_annee}" {chk_annee}>{dte_annee}</OPTION>
					<!-- END: lst_annee -->
					</SELECT>

					&nbsp;afficher le bilan au : <input id="form_mois" type="date" class='form-control' name="form_mois" value="{form_mois}" size="10" OnChange="Recharge();" />
				</div>
			</div>
			<div class="card-body">
				<TABLE class="table table-hover datatable table-thinline">
				  <tr class="t-header">
					<th width=400>Poste</th>
					<th>&nbsp;</th>
					<th width=150 class="bor-left dt-center">{annee}</th>
					<!-- BEGIN: old_poste -->
					<th width=150 class="bor-left dt-center">{old_annee}</th>
					<!-- END: old_poste -->
				  </tr>
				<!-- BEGIN: lst_poste -->
				  <TR class="bg-gray-lighter">
					<TD>{nom_poste}</TD>
					<TD>&nbsp;</TD>
					<td class="bor-left dt-right"><b>{total_poste}</b></td>
					<!-- BEGIN: lst_old_poste -->
					<td class="bor-left dt-right txt-light "><i>{old_total_poste}</i></td>
					<!-- END: lst_old_poste -->
				  </TR>

				  <!-- BEGIN: lst_sousposte -->
					<!-- BEGIN: lst_ligne -->
					<!-- END: lst_ligne -->
				  <TR>
					<TD>{nom_sousposte}</TD>
					<TD>{date_sousposte}&nbsp;</TD>
					<TD class="bor-left dt-right">{tot_sousposte}</TD>
					<!-- BEGIN: lst_old_sousposte -->
					<TD class="bor-left dt-right txt-light" ><i>{old_tot_sousposte}</i></TD>
					<!-- END: lst_old_sousposte -->
				  </TR>
				  <!-- END: lst_sousposte -->

				<!-- END: lst_poste -->

				  <TR class="bor-large-top t-header">
					<TD><b>Total :</b>&nbsp;</TD>
					<TD>&nbsp;</TD>
					<TD class="bor-left dt-right"><B>{total}</B></TD>
					<!-- BEGIN: aff_old_total -->
					<td class="bor-left dt-right txt-light"><b><i>{old_total}</i></b></td>
					<!-- END: aff_old_total -->
				  </TR>

				</TABLE>
			</div>
		</div>
	</div>
</div>
</FORM>



<!-- END: corps -->
