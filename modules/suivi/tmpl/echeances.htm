<!-- BEGIN: corps -->
<script language="JavaScript">
function Recharge()
{
 	document.location='{path_root}/suivi/echeances?form_id='+document.getElementById('form_id').value;
}
function selectAll()
{
	var t=false;
	if (document.getElementById('form_debite').checked==true)
	{
		t=true;
	}
	<!-- BEGIN: lst_checkbox -->
	document.getElementById('form_debite_{form_uid}').checked=t;
	<!-- END: lst_checkbox -->
}
</script>

<FORM name="reservation" method="post" action="{path_root}/suivi/echeances" enctype="multipart/form-data">
	
	<INPUT type="hidden" name="form_id" value="{form_id}">

<div class="row">
	<div class="card">
		<div class="card-header">Echéances</div>
		<div class="card-line">
			<div class="col-md-2">
				<select id="form_id" class='form-control' OnChange="Recharge();">
					<option value="0">Choisissez l'échéance</option>
				<!-- BEGIN: lst_echeance -->
					<option value="{form_echeanceid}" {select_echeance}>{form_echeance}</option>
				<!-- END: lst_echeance -->
				</select>
			</div>

			<!-- BEGIN: aff_debite -->
			<div class="col-lg-3 m-left-20">
				<label class="form-check-label">Nouvelle échéance :</label><input type="date" class='form-control' name="form_date" style="width:150px!important;"> 
			</div>
			<div class="col-md-2">
				Cout : <input type="text" class='form-control' name="form_cout" value="{form_cout}" style="width:80px!important;">
			</div>
			<div class="col-md-2">
				<input type="submit" class="btn btn-primary" name="fonc" value="Débiter" style="width:150px!important; margin-left:20px;">
			</div>
			<!-- END: aff_debite -->

			<div class="col-md-2">
			<input type="submit" class="btn btn-outline-primary" name="print" value="Imprimer" style="width:150px!important; margin-left:20px;" onClick="window.print()">
			</div>
		</div>
	</div>
</div>

	
<!-- BEGIN: aff_visualisation -->
<div class="row">
	<div class="col grid-margin stretch-card">
		<div class="card">
			<div class="card-header">Débiter les cotisations</div>
			<div class="card-body">
				<div class="form-group">
					<input type="hidden" name="form_date" value="{form_date}">
					<!-- BEGIN: lst_visualisation -->
					<input type="hidden" name="form_dteid[{form_mvtid}]" value="{form_dteid}">
					{enr_mouvement}
					<!-- END: lst_visualisation -->

				</div>
			</div>
			<div class="card-footer">
				<input type="submit" class="btn btn-primary" name="fonc" value="Valider">
				<input type="submit" class="btn btn-light" name="fonc" value="Annuler">
			</div>
		</div>
	</div>
</div>
<!-- END: aff_visualisation -->

<div class="row">
	<div class="col grid-margin stretch-card">
		<div class="card">
			<div class="card-body">
			{aff_tableau}
			</div>
		</div>
	</div>
</div>

</FORM>

<!-- END: corps -->
