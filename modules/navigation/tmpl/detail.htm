<script>
	var coordinates = [{map_lat}, {map_lon}];
	var markerRed=L.layerGroup();

	var osm=L.tileLayer('{tileLayer_url}', {
			maxZoom: 20,
			attribution: 'Navigation'
		});

	var mapOptions = {
		center: coordinates,
		zoom: 7,
		zoomControl: true,
		editable: false,
		printable: true,
		downloadable: false,
		layers:[osm,markerRed]
	}

	$(document).ready(function() { 
		mymap = L.map('statusmap',mapOptions);

		$.get('/api/v1/navigation/map?id='+$("#id").val()).done(function(data)
		{
			for (var key in data.data)
			{
				if ((data.data[key].latitude!="") && (data.data[key].longitude!=""))
				{
					var marker = L.marker([data.data[key].latitude, data.data[key].longitude]).addTo(markerRed);
				}
			}
		});

	});

    $("#form_point").autocomplete({
        source: "api.php?mod=navigation&rub=getwp",
        select: function(event, ui) { oFormObject = document.forms['form_route']; oFormObject.elements["form_point"].value=ui.item.value; form_route.submit() },
        delay: 0
    });

   $(document).tooltip({
      position: {
        my: "center bottom-20",
        at: "center top",
        using: function( position, feedback ) {
          $( this ).css( position );
          $( "<div>" )
            .addClass( "arrow" )
            .addClass( feedback.vertical )
            .addClass( feedback.horizontal )
            .appendTo( this );
        }
      }
    });


	<!-- BEGIN: aff_sortable -->
    $( "#waypoint" ).sortable({
        update: function (event, ui) {
	        var order = $(this).sortable('serialize');
	
	        // POST to server using $.post or $.ajax
	        $.ajax({
							data: order,
	            type: 'POST',
	            url: 'api.php?mod=navigation&rub=updwp&nid={form_id}'
	        });
    		}

  	});
    $( "#waypoint" ).disableSelection();
<!-- END: aff_sortable -->

</script>
