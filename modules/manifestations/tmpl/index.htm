<div class="row">
	<div class="col grid-margin stretch-card">
		<div class="card">
			<div class="card-body">

				<div id='script-warning' style='display:none;'>
					Erreur : <code>api.php</code> doit être accessible.
				</div>

				<div id='loading'>loading...</div>

				<div id='calendar'></div>
			</div>
		</div>
	</div>
</div>

<script src='{path_root}/{path_core}/external/fullcalendar/fullcalendar.v6.js'></script>


<script>
	document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        var calendar = new FullCalendar.Calendar(calendarEl, {
			initialDate: '{form_jour}',
			locale: 'fr',
			height: 700,
			editable: true,
			selectable: true,
			contentHeight: 'auto',
			dayMaxEvents: 4,
			displayEventTime: false,

			headerToolbar: {
				left: 'prev,next,today',
				center: 'title',
				right: ''
			},

			buttonText: {
				today:  "Aujourd'hui",
				month:  "Mois",
				week:   "Semaine",
				day:    "Jour",
				list:   "Liste"
			},

			businessHours:
		    {
				start: '0:00', // a start time (10am in this example)
				end: '24:00', // an end time (12pm in this example)
				dow: [ 1,2,3,4,5 ]
			},

			eventClick: function(event, element) {
				document.location="{path_root}/manifestations/detail?id="+event.id;
			},

			/*
			select: function(start, end) {
				document.location="{path_root}/manifestations/detail?jstart="+start;
			},
			eventResize: function(event, dayDelta, minuteDelta ) {
				$.ajax({ url: '{path_root}/api.php?mod=manifestations&rub=updatecal&id='+event.id+'&jstart='+event.start });
			},
			eventDrop: function(event,dayDelta,minuteDelta) {
				$.ajax({ url: '{path_root}/api.php?mod=manifestations&rub=updatecal&id='+event.id+'&jstart='+event.start });
			},
			*/


			select: function(event) {
				dteStart=new Date(event.startStr);
				timeStart=Math.floor(dteStart.getTime() / 1000);
				dteEnd=new Date(event.endStr);
				timeEnd=Math.floor(dteEnd.getTime() / 1000);
				document.location="{path_root}/manifestations/detail?jstart="+timeStart;
			},

			eventResize: function(event) {
				e=event.event.extendedProps;
				dteStart=new Date(event.event.startStr);
				timeStart=Math.floor(dteStart.getTime() / 1000);

				$.ajax({
					url: '{path_root}/api/v1/manifestations/updatecal?id='+e.eventId+'&jstart='+timeStart,
					dataType: 'JSON',
					success : function(response)
					{
						if (response.status!=200)
						{
							showToast("Mise à jour",response.value,"error");
						}
					},
					error : function(response)
					{
						console.log(response);
					}
				});
			},
			eventDrop: function(event,dayDelta,revertFunc) {
				console.log("drop");
				e=event.event.extendedProps;
				dteStart=new Date(event.event.startStr);
				timeStart=Math.floor(dteStart.getTime() / 1000);

				$.ajax({
					url: '{path_root}/api/v1/manifestations/updatecal?id='+e.eventId+'&jstart='+timeStart,
					dataType: 'JSON',
					success : function(response)
					{
						if (response.status!=200)
						{
							showToast("Mise à jour",response.value,"error");
						}
					},
					error : function(response)
					{
						console.log(response);
					}
				});
			},


			events: {
				url: '{path_root}/api.php?mod=manifestations&rub=getcal',
				error: function() {
						$('#script-warning').show();
					}
			},
			loading: function(bool) {
				$('#loading').toggle(bool);
			}
		});
		calendar.render();
	});


</script>
				
<!-- END: corps -->
