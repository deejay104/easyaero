<!-- BEGIN: corps -->
<style>

	.fc-v-event .fc-event-main { color: var(--p67-primary); }
	.fc .fc-col-header-cell-cushion { padding: 0; }

</style>

<div class="row">
	<div class="col grid-margin stretch-card">
		<div class="card">
			<div class="card-body">

				<div id='loading'>loading...</div>
				<div id='calendar'></div>

			</div>
		</div>
	</div>
</div>

<script src='{path_root}/{path_core}/external/fullcalendar/fullcalendar.v6.js'></script>

<script>

	document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        var calendar = new FullCalendar.Calendar(calendarEl, {
			initialView: '{defaultView}',
			initialDate: '{form_jour}',
			timeZone: '{timezone}', 
			defaultTimedEventDuration: 60,
			eventTimeFormat: { hour: '2-digit', minute: '2-digit', hour12: false },
			locale: 'fr',
			editable: true,
			selectable: true,
			selectHelper: true,
			slotMinTime: '{form_debjour}:00:00',
			slotMaxTime: '{form_finjour}:00:00',
			scrollTime: '{form_debjour}:00:00',
			contentHeight: 'auto',
			allDaySlot: false,
			slotEventOverlap: false,
			firstDay: {weekFirstDay},

			buttonText: {
				today:  "Aujourd'hui",
				month:  "Mois",
				week:   "Semaine",
				day:    "Jour",
				list:   "Liste"
			},

			headerToolbar: {
				left: 'prev,next,today',
				center: 'title',
				right: '{headerListe}'
			},

			businessHours:
			{
				daysOfWeek: [1, 2, 3, 4, 5], // Lun-Ven
				startTime: '00:00',
				endTime: '24:00'
			},

			views: {
				agendaWeek: {
					type: 'timeGrid',
					duration: {weeks: 1},
					buttonText: 'Semaine',
					dayHeaderFormat: { weekday: 'short', day: 'numeric', omitCommas: true },
				},
				agendaTwoWeeks: {
					type: 'timeGrid',
					duration: {weeks: 2},
					buttonText: '2 Semaines',
					dayHeaderFormat: { weekday: 'short', day: 'numeric', omitCommas: true },
				},
				agendaFourWeeks: {
					type: 'timeGrid',
					duration: {weeks: 4},
					buttonText: '4 Semaines',
					dayHeaderFormat: { day: 'numeric', omitCommas: true },
				},
				agendaHeightWeeks: {
					type: 'timeGrid',
					duration: {weeks: 8},
					buttonText: '2 mois',
					dayHeaderFormat: { day: 'numeric', omitCommas: true },
				}
			},
			eventClick: function(event) {
				var is_confirmed = confirm("Voulez-vous supprimer cette disponibilité ?");
				if (is_confirmed)
				{ 
					console.log("delete:"+event.event.extendedProps.eventId);	
					$.ajax({
						url: '{path_root}/api/v1/membres/upddispo?fonc=delete&id='+event.event.extendedProps.eventId,
						dataType: 'JSON',
						success : function(response)
						{
							if (response.status!=200)
							{
								showToast("Mise à jour",response.error,"error");
							}
							else
							{
								event.event.remove();
							}
						},
						error : function(response)
						{
							console.log(response);
						}
					});
				}
			},
			select: function(event) {
				dteStart=new Date(event.startStr);
				timeStart=Math.floor(dteStart.getTime() / 1000);
				dteEnd=new Date(event.endStr);
				timeEnd=Math.floor(dteEnd.getTime() / 1000);

				$.ajax({
					url: '{path_root}/api/v1/membres/upddispo?fonc=select&id=0&mid={mid}&&jstart='+timeStart+'&jend='+timeEnd,
					
					dataType: 'JSON',
					success : function(response)
					{
						if (response.status!=200)
						{
							showToast("Mise à jour",response.error,"error");
						}
						calendar.addEvent({
							id: response.id,
							title: '',
							start: response.start,
							end: response.end,
							color: '#{eventcolor}'
						});
					},
					error : function(response)
					{
						console.log(response);
					}
				});

			},
			eventDrop: function(event) {
console.log("drop");
				e=event.event.extendedProps;
				dteStart=new Date(event.event.startStr);
				timeStart=Math.floor(dteStart.getTime() / 1000);
				dteEnd=new Date(event.event.endStr);
				timeEnd=Math.floor(dteEnd.getTime() / 1000);

				$.ajax({
					url: '{path_root}/api/v1/membres/upddispo?fonc=drop&id='+e.eventId+'&jstart='+timeStart+'&jend='+timeEnd,
					dataType: 'JSON',
					success : function(response)
					{
						if (response.status!=200)
						{
							showToast("Mise à jour",response.error,"error");
						}
					},
					error : function(response)
					{
						console.log(response);
					}
				});
			},
			eventResize: function(event) {
				e=event.event.extendedProps;
				dteStart=new Date(event.event.startStr);
				timeStart=Math.floor(dteStart.getTime() / 1000);
				dteEnd=new Date(event.event.endStr);
				timeEnd=Math.floor(dteEnd.getTime() / 1000);

				$.ajax({
					url: '{path_root}/api/v1/membres/upddispo?fonc=resize&id='+e.eventId+'&jstart='+timeStart+'&jend='+timeEnd,
					dataType: 'JSON',
					success : function(response)
					{
						if (response.status!=200)
						{
							showToast("Mise à jour",response.error,"error");
							revertFunc();
						}
					},
					error : function(response)
					{
						console.log(response);
						revertFunc();
					}
				});
			},

			events: {
				url: '{path_root}/api/v1/membres/getdispo?mid={mid}',
				error: function() {
					showToast("","L'API n'est pas accessible","error");
				}
			},

			loading: function(bool) {
				$('#loading').toggle(bool);
			}
		});
		calendar.render();
	});

</script>

<!-- END: corps -->
